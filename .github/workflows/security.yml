name: Security Scan

on: [push]

jobs:
  security-check:
    run-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Run Security check
      run: |
        python security_check.py
